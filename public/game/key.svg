<svg width="100%" viewBox="0 0 220 420" xmlns="http://www.w3.org/2000/svg">
<title>Rustic skeleton key</title>
<defs>
<linearGradient id="keyShaft" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#58483A"/><stop offset="25%" stop-color="#4A3C2E"/><stop offset="50%" stop-color="#3E3228"/><stop offset="75%" stop-color="#4A3C2E"/><stop offset="100%" stop-color="#58483A"/></linearGradient>
<linearGradient id="keyBow" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C4960E"/><stop offset="30%" stop-color="#A07010"/><stop offset="70%" stop-color="#8B6914"/><stop offset="100%" stop-color="#7A5C10"/></linearGradient>
<linearGradient id="keyBowHL" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#DABB60"/><stop offset="50%" stop-color="#C4960E"/><stop offset="100%" stop-color="#A07010"/></linearGradient>
</defs>
<g transform="translate(110, 200)">
<ellipse cx="0" cy="178" rx="55" ry="8" fill="#0A0400" opacity="0.1"/>

<!-- Shaft -->
<rect x="-7" y="-28" width="14" height="185" rx="2" fill="url(#keyShaft)" stroke="#1E1612" stroke-width="1.5"/>
<line x1="0" y1="-22" x2="0" y2="150" stroke="#2C221C" stroke-width="2.5" opacity="0.3"/>
<line x1="-5.5" y1="-25" x2="-5.5" y2="153" stroke="#6A5A4A" stroke-width="0.5" opacity="0.25"/>
<line x1="5.5" y1="-25" x2="5.5" y2="153" stroke="#6A5A4A" stroke-width="0.5" opacity="0.25"/>

<!-- Teeth -->
<g fill="url(#keyShaft)" stroke="#1E1612" stroke-width="1.2">
<rect x="7" y="108" width="30" height="11" rx="1.5"/>
<rect x="7" y="128" width="22" height="11" rx="1.5"/>
<rect x="7" y="90" width="25" height="10" rx="1.5"/>
</g>
<line x1="36" y1="109" x2="36" y2="118" stroke="#6A5A4A" stroke-width="0.5" opacity="0.3"/>
<line x1="28" y1="129" x2="28" y2="138" stroke="#6A5A4A" stroke-width="0.5" opacity="0.3"/>
<line x1="31" y1="91" x2="31" y2="99" stroke="#6A5A4A" stroke-width="0.5" opacity="0.3"/>
<rect x="-4" y="96" width="8" height="7" rx="0.5" fill="#1E1612" opacity="0.4"/>

<!-- Collar -->
<rect x="-14" y="-30" width="28" height="10" rx="2" fill="url(#keyShaft)" stroke="#1E1612" stroke-width="1.2"/>
<line x1="-12" y1="-24" x2="12" y2="-24" stroke="#6A5A4A" stroke-width="0.5" opacity="0.25"/>

<!-- Bow -->
<circle cx="0" cy="-78" r="52" fill="url(#keyBow)" stroke="#6A5010" stroke-width="2.5"/>
<circle cx="0" cy="-78" r="42" fill="none" stroke="#7A5C10" stroke-width="1.8"/>
<circle cx="0" cy="-78" r="25" fill="#C4960E" stroke="#8B6914" stroke-width="1.2"/>
<circle cx="0" cy="-78" r="17" fill="url(#keyBowHL)" stroke="#7A5C10" stroke-width="1"/>
<circle cx="0" cy="-78" r="9" fill="#6A5010" stroke="#5A4208" stroke-width="1"/>

<!-- Scrollwork -->
<g stroke="#6A5010" stroke-width="1.2" fill="none" opacity="0.35">
<path d="M-42,-58 Q-30,-66 -30,-78 Q-30,-90 -42,-98"/>
<path d="M42,-58 Q30,-66 30,-78 Q30,-90 42,-98"/>
<path d="M-18,-34 Q-10,-42 0,-34 Q10,-42 18,-34"/>
<path d="M-18,-122 Q-10,-114 0,-122 Q10,-114 18,-122"/>
</g>

<!-- Trefoils -->
<circle cx="0" cy="-126" r="7" fill="#A07010" stroke="#6A5010" stroke-width="1"/><circle cx="-3" cy="-129" r="3" fill="#B8860B" opacity="0.5"/>
<circle cx="0" cy="-30" r="7" fill="#A07010" stroke="#6A5010" stroke-width="1"/>
<circle cx="-50" cy="-78" r="7" fill="#A07010" stroke="#6A5010" stroke-width="1"/>
<circle cx="50" cy="-78" r="7" fill="#A07010" stroke="#6A5010" stroke-width="1"/>

<!-- Bow highlight -->
<path d="M-28,-105 Q0,-115 28,-105" fill="none" stroke="#DABB60" stroke-width="1" opacity="0.3"/>

<!-- Patina -->
<g opacity="0.1" fill="#4A6A4A">
<circle cx="-35" cy="-68" r="3"/><circle cx="25" cy="-92" r="2.5"/>
<circle cx="4" cy="50" r="2.2"/><circle cx="-3" cy="120" r="2.5"/>
</g>

<!-- Shaft rivets -->
<circle cx="0" cy="8" r="4" fill="#404040" stroke="#222" stroke-width="1"/><circle cx="0" cy="7.5" r="1.6" fill="#555"/>
<circle cx="0" cy="55" r="4" fill="#404040" stroke="#222" stroke-width="1"/><circle cx="0" cy="54.5" r="1.6" fill="#555"/>
</g>
</svg>
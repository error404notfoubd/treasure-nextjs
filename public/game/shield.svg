<stop offset="40%" stop-color="#A07010"/>
<stop offset="100%" stop-color="#7A5C10"/>
</linearGradient>
<linearGradient id="sWoodV" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#7E5634"/>
<stop offset="50%" stop-color="#5E381E"/>
<stop offset="100%" stop-color="#3A1E0C"/>
</linearGradient>
<clipPath id="shieldClip">

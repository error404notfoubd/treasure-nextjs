<svg width="100%" viewBox="0 0 360 440" xmlns="http://www.w3.org/2000/svg">
<title>Rustic shield</title>
<defs>
<linearGradient id="sBody" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#7E5634"/>
<stop offset="20%" stop-color="#6E4628"/>
<stop offset="45%" stop-color="#5E381E"/>
<stop offset="70%" stop-color="#502E16"/>
<stop offset="100%" stop-color="#3A1E0C"/>
</linearGradient>
<linearGradient id="sHL" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#8A6438" stop-opacity="0.5"/>
<stop offset="50%" stop-color="#8A6438" stop-opacity="0"/>
</linearGradient>
<linearGradient id="sBand" x1="0" y1="0" x2="0.3" y2="1">
<stop offset="0%" stop-color="#58483A"/>
<stop offset="25%" stop-color="#4A3C2E"/>
<stop offset="55%" stop-color="#3E3228"/>
<stop offset="100%" stop-color="#2C221C"/>
</linearGradient>
<linearGradient id="sBrass" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#DABB60"/>
<stop offset="30%" stop-color="#C4960E"/>
<stop offset="70%" stop-color="#A07010"/>
<stop offset="100%" stop-color="#8B6914"/>
